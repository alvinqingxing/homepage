<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b2124" />
      <stop offset="50%" stop-color="#262e33" />
      <stop offset="100%" stop-color="#2d373d" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)" />

  <g transform="translate(960, 540)" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.45" filter="url(#glow)">
    <polygon points="0,-350 303,-175 303,175 0,350 -303,175 -303,-175" stroke-dasharray="5,5" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="-350" />
    <line x1="0" y1="0" x2="303" y2="175" />
    <line x1="0" y1="0" x2="-303" y2="175" />
    
    <circle cx="0" cy="0" r="240" stroke-width="1" opacity="0.25"/>
    <ellipse cx="0" cy="0" rx="240" ry="110" />
    <ellipse cx="0" cy="0" rx="110" ry="240" />
    
    <path d="M -210,-120 C -100,-280 100,-280 210,-120" />
    <path d="M -210,120 C -100,280 100,280 210,120" />
    <path d="M -260,0 C -150,-150 150,-150 260,0" />
    <path d="M -260,0 C -150,150 150,150 260,0" />
    
    <circle cx="0" cy="0" r="6" fill="#ffffff" stroke="none"/>
    <circle cx="0" cy="-350" r="4" fill="#ffffff"/>
    <circle cx="303" cy="175" r="4" fill="#ffffff"/>
    <circle cx="-303" cy="175" r="4" fill="#ffffff"/>
  </g>
</svg>
